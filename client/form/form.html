<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a Movie</title>
    <link rel="stylesheet" href="form.css" />
    <script defer src="form.js"></script>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <main class="form-page">

                <p class="page-title">MovieApp</p>

                <section class="form-header">
                    <h1>Add a Movie</h1>
                    <p class="quote-text">"Log it before you forget it"</p>
                </section>

                <div class="poster-preview">
                    <img id="poster-img" src="" alt="Movie poster preview" />
                    <p id="poster-placeholder">Poster preview</p>
                </div>

                <form id="add-movie-form">

                    <div class="input-group">
                        <label for="movie_name">Movie Title</label>
                        <input
                            type="text"
                            id="movie_name"
                            name="movie_name"
                        />
                    </div>

                    <div class="input-group">
                        <label for="director">Director</label>
                        <input
                            type="text"
                            id="director"
                            name="director"
                        />
                    </div>

                    <div class="input-group">
                        <label for="producer">Producer</label>
                        <input
                            type="text"
                            id="producer"
                            name="producer"
                        />
                    </div>

                    <div class="input-group">
                        <label for="notable_actors">Notable Actors</label>
                        <input
                            type="text"
                            id="notable_actors"
                            name="notable_actors"
                        />
                    </div>

                    <div class="input-group">
                        <label for="year_released">Year Released</label>
                        <input
                            type="number"
                            id="year_released"
                            name="year_released"
                            min="1888"
                            max="2099"
                        />
                    </div>

                    <div class="input-group">
                        <label for="poster_img_url">Poster Image URL</label>
                        <input
                            type="url"
                            id="poster_img_url"
                            name="poster_img_url"
                        />
                    </div>

                    <button type="submit" id="add-movie-btn">Add Movie</button>

                </form>

                <p id="message"></p>

            </main>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn" id="home-btn">Home</button>
            <button class="nav-btn" id="my-list-btn">My List</button>
            <button class="nav-btn" id="form-btn">Form</button>
        </nav>

    </div>
</body>
</html>
