<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie App Home</title>
    <link rel="stylesheet" href="home.css" />
    <script defer src="home.js"></script>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <main class="home-page">
                <section class="home-header">
                    <p class="page-title">MovieApp</p>
                    <h1>Home</h1>
                </section>

                <section class="search-section">
                    <input
                        type="text"
                        id="search-bar"
                        placeholder="Search movies..."
                    />
                </section>

                <section class="movie-section">
                    <div class="movie-list-box">
                        <p id="movie-message">Your movies will appear here.</p>
                    </div>
                </section>

                <nav class="bottom-nav">
                    <button id="home-btn" type="button">Home</button>
                    <button id="my-list-btn" type="button">My List</button>
                    <button id="form-btn" type="button">Form</button>
                </nav>
            </main>
        </div>
    </div>
</body>
</html>
