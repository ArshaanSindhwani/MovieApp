<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">
    <script defer src="../shared/translations.js"></script>
    <script defer src="../shared/translator.js"></script>
    <script src="./login.js" defer></script>
</head>
<body>
    <div class="phone">
        <div class="screen">

            <div class="content">

                <h1 data-text="login-title">Welcome Back!</h1>

                <form id="login-form">

                    <div>
                        <input required type="text" name="username" id="username-input" placeholder="Username" data-text-ph="login-username">
                    </div>

                    <div>
                        <input required type="password" name="password" id="password-input" placeholder="Password" data-text-ph="login-password">
                    </div>

                    <a href="#" data-text="login-forgot">Forgot details?</a>

                    <button type="submit" data-text="login-btn">Login</button>

                    <hr>

                    <select name="lang" id="lang-select">
                        <option value="" data-text="login-select-lang">Select Language</option>
                        <option value="en">English</option>
                        <option value="jp">日本語</option>
                        <option value="kr">한국인</option>
                        <option value="sp">español</option>
                    </select>

                    <a href="../register/register.html" data-text="login-signup-link">No account? Sign up now!</a>

                </form>

            </div>

        </div>
    </div>
</body>
</html>
