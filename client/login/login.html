<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="login.css">

</head>

<body>
    
    <div class="phone">
        <div class="screen">

            <div class="content">
                <h1>Welcome Back!</h1>

                <form>
                    <div>
                        <input required type="email" name="email" id="email-input" placeholder="Email">
                    </div>

                    <div>
                        <input required type="password" name="password" id="password-input" placeholder="Password">
                    </div>

                    <a href="#">Forgot details?</a>

                    <button type="submit">Login</button>
                    
                    <hr>

                    <select name="lang" id="lang-select">
                        <option value="">Select Language</option>
                        <option value="en">English</option>
                        <option value="jp">Japanese</option>
                        <option value="kr">Korean</option>
                        <option value="sp">Spanish</option>
                    </select>

                    <a href="register.html">No account? Sign up now!</a>
                </form>

            </div>

        </div>
    </div>

</body>

</html>
